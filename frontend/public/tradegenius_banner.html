<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trade Genius - Referral Bonus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }
        
        .banner {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(180deg, #0a1628 0%, #0d2137 50%, #061018 100%);
            position: relative;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }
        
        .banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 217, 192, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 192, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .glow-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 217, 192, 0.15) 0%, transparent 70%);
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .glow-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 217, 192, 0.2) 0%, transparent 70%);
            bottom: 20%;
            left: 10%;
        }
        
        .sparkle {
            position: absolute;
            color: #00d9c0;
            font-size: 20px;
            opacity: 0.8;
        }
        .sparkle:nth-child(1) { top: 8%; left: 5%; }
        .sparkle:nth-child(2) { top: 15%; right: 10%; }
        .sparkle:nth-child(3) { top: 45%; right: 5%; }
        .sparkle:nth-child(4) { bottom: 25%; left: 8%; }
        .sparkle:nth-child(5) { top: 35%; left: 3%; }
        .sparkle:nth-child(6) { bottom: 35%; right: 8%; font-size: 14px; }
        
        .logo-section {
            text-align: center;
            padding-top: 50px;
            position: relative;
            z-index: 10;
        }
        
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 217, 192, 0.1);
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid rgba(0, 217, 192, 0.3);
        }
        
        .logo-icon {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #00d9c0 0%, #00a896 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #0a1628;
            font-size: 18px;
        }
        
        .logo-text {
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .main-title {
            text-align: center;
            margin-top: 50px;
            position: relative;
            z-index: 10;
        }
        
        .title-box {
            display: inline-block;
            background: linear-gradient(135deg, #00d9c0 0%, #00b4a0 100%);
            padding: 15px 60px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .title-box h1 {
            color: #0a1628;
            font-size: 52px;
            font-weight: 900;
            letter-spacing: 4px;
        }
        
        .subtitle {
            color: #fff;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 8px;
            text-shadow: 0 0 30px rgba(0, 217, 192, 0.5);
        }
        
        .center-visual {
            position: relative;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
        
        .coin-left {
            position: absolute;
            left: 80px;
            top: 50%;
            transform: translateY(-50%) rotateY(20deg);
        }
        
        .coin {
            width: 160px;
            height: 160px;
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 30%, #a0a0a0 70%, #d0d0d0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 20px 60px rgba(0, 217, 192, 0.3),
                inset 0 -5px 20px rgba(0,0,0,0.2);
            position: relative;
        }
        
        .coin::after {
            content: '◆';
            font-size: 70px;
            color: #2c3e50;
        }
        
        .coin-glow {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 40px;
            background: radial-gradient(ellipse, rgba(0, 217, 192, 0.4) 0%, transparent 70%);
        }
        
        .platform {
            position: relative;
            width: 350px;
            height: 350px;
        }
        
        .platform-base {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 150px;
            background: linear-gradient(180deg, #1a3a5c 0%, #0d2137 100%);
            border-radius: 50%;
            border: 2px solid rgba(0, 217, 192, 0.3);
            box-shadow: 
                0 10px 40px rgba(0, 217, 192, 0.2),
                inset 0 -20px 40px rgba(0,0,0,0.3);
        }
        
        .platform-ring {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 80px;
            border: 3px solid #00d9c0;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 217, 192, 0.5);
        }
        
        .diamond {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00d9c0 0%, #00ffdd 50%, #00a896 100%);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            box-shadow: 0 0 40px rgba(0, 217, 192, 0.8);
        }
        
        .pawn {
            position: absolute;
            width: 25px;
            height: 45px;
            background: linear-gradient(180deg, #fff 0%, #ccc 100%);
            border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
        }
        
        .pawn::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: linear-gradient(180deg, #fff 0%, #ddd 100%);
            border-radius: 50%;
        }
        
        .pawn:nth-child(1) { bottom: 120px; left: 30px; }
        .pawn:nth-child(2) { bottom: 100px; left: 80px; }
        .pawn:nth-child(3) { bottom: 80px; left: 140px; }
        .pawn:nth-child(4) { bottom: 80px; right: 140px; }
        .pawn:nth-child(5) { bottom: 100px; right: 80px; }
        .pawn:nth-child(6) { bottom: 120px; right: 30px; }
        .pawn:nth-child(7) { bottom: 150px; left: 60px; transform: scale(0.8); }
        .pawn:nth-child(8) { bottom: 150px; right: 60px; transform: scale(0.8); }
        
        .bottom-section {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
        }
        
        .tagline-small {
            color: #8899aa;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        
        .tagline-big {
            color: #fff;
            font-size: 38px;
            font-weight: 800;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        
        .footer {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
        }
        
        .website {
            color: #8899aa;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="sparkle">✦</div>
        <div class="sparkle">✦</div>
        <div class="sparkle">✦</div>
        <div class="sparkle">✦</div>
        <div class="sparkle">✦</div>
        <div class="sparkle">✧</div>
        
        <div class="glow-1"></div>
        <div class="glow-2"></div>
        
        <div class="logo-section">
            <div class="logo">
                <div class="logo-icon">TG</div>
                <span class="logo-text">Trade Genius</span>
            </div>
        </div>
        
        <div class="main-title">
            <div class="title-box">
                <h1>REFERRAL</h1>
            </div>
            <div class="subtitle">BONUSES</div>
        </div>
        
        <div class="center-visual">
            <div class="coin-left">
                <div class="coin"></div>
                <div class="coin-glow"></div>
            </div>
            
            <div class="platform">
                <div class="diamond"></div>
                <div class="platform-ring"></div>
                <div class="platform-base"></div>
                <div class="pawn"></div>
                <div class="pawn"></div>
                <div class="pawn"></div>
                <div class="pawn"></div>
                <div class="pawn"></div>
                <div class="pawn"></div>
                <div class="pawn"></div>
                <div class="pawn"></div>
            </div>
        </div>
        
        <div class="bottom-section">
            <div class="tagline-small">BASED ON VERIFIED</div>
            <div class="tagline-big">TEAM ACTIVITY</div>
        </div>
        
        <div class="footer">
            <div class="website">www.tradegenius.exchange</div>
        </div>
    </div>
</body>
</html>
