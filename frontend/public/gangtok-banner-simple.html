<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Exchange - Silver Rank Gangtok Trip</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .banner {
            width: 800px;
            height: 600px;
            background: linear-gradient(180deg, #0f1628 0%, #1a2744 50%, #0f1628 100%);
            border: 8px solid #d4af37;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 40px;
        }
        
        /* Top Logo */
        .top-logo {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .logo-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #00E5FF, #00B4D8);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 22px;
            color: #0f1628;
            margin: 0 auto 6px;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.5);
        }
        
        .logo-text {
            font-size: 14px;
            font-weight: 700;
            color: white;
        }
        
        .logo-text span {
            color: #00E5FF;
        }
        
        /* Silver Badge */
        .silver-badge {
            text-align: center;
            margin-bottom: 12px;
        }
        
        .badge-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #C0C0C0, #E8E8E8, #A8A8A8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 0 35px rgba(192, 192, 192, 0.6);
            border: 3px solid #d4af37;
        }
        
        .badge-circle span {
            font-size: 35px;
        }
        
        .badge-text {
            margin-top: 6px;
            font-size: 16px;
            font-weight: 800;
            color: #C0C0C0;
            text-shadow: 0 0 15px rgba(192, 192, 192, 0.5);
            letter-spacing: 2px;
        }
        
        /* Destination */
        .destination {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .dest-city {
            font-size: 50px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF6B35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1.1;
        }
        
        .dest-state {
            font-size: 20px;
            font-weight: 600;
            color: #00E5FF;
            letter-spacing: 10px;
        }
        
        /* Trip Details */
        .trip-details {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .trip-box {
            text-align: center;
            background: rgba(212, 175, 55, 0.15);
            border: 2px solid #d4af37;
            border-radius: 12px;
            padding: 10px 25px;
        }
        
        .trip-value {
            font-size: 28px;
            font-weight: 900;
            color: #FFD700;
        }
        
        .trip-label {
            font-size: 11px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Main Title */
        .main-title {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .title-text {
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .title-text .white {
            color: white;
        }
        
        .title-text .gold {
            color: #FFD700;
        }
        
        /* Date Section - Colorful Rainbow */
        .date-section {
            text-align: center;
        }
        
        .date-box {
            background: linear-gradient(90deg, #FF6B35, #FF8C42, #FFD700, #4ADE80, #00E5FF, #818CF8, #C084FC);
            background-size: 400% 100%;
            animation: rainbow 4s linear infinite;
            padding: 12px 45px;
            border-radius: 35px;
            display: inline-block;
            box-shadow: 0 5px 30px rgba(255, 107, 53, 0.4);
        }
        
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }
        
        .date-text {
            font-size: 22px;
            font-weight: 900;
            color: #0f1628;
            letter-spacing: 2px;
        }
        
        /* Corner decorations */
        .corner-deco {
            position: absolute;
            width: 45px;
            height: 45px;
            border: 3px solid #d4af37;
        }
        
        .corner-tl {
            top: 10px;
            left: 10px;
            border-right: none;
            border-bottom: none;
        }
        
        .corner-tr {
            top: 10px;
            right: 10px;
            border-left: none;
            border-bottom: none;
        }
        
        .corner-bl {
            bottom: 10px;
            left: 10px;
            border-right: none;
            border-top: none;
        }
        
        .corner-br {
            bottom: 10px;
            right: 10px;
            border-left: none;
            border-top: none;
        }
        
        /* Sparkles */
        .sparkle {
            position: absolute;
            font-size: 16px;
            animation: sparkle 2s ease-in-out infinite;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .sparkle:nth-child(1) { top: 70px; left: 50px; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 90px; right: 60px; animation-delay: 0.5s; }
        .sparkle:nth-child(3) { top: 180px; left: 45px; animation-delay: 1s; }
        .sparkle:nth-child(4) { top: 200px; right: 50px; animation-delay: 1.5s; }
        .sparkle:nth-child(5) { top: 320px; left: 60px; animation-delay: 0.3s; }
        .sparkle:nth-child(6) { top: 340px; right: 55px; animation-delay: 0.8s; }
        .sparkle:nth-child(7) { top: 450px; left: 55px; animation-delay: 0.2s; }
        .sparkle:nth-child(8) { top: 470px; right: 60px; animation-delay: 0.7s; }
    </style>
</head>
<body>
    <div class="banner">
        <!-- Corner decorations -->
        <div class="corner-deco corner-tl"></div>
        <div class="corner-deco corner-tr"></div>
        <div class="corner-deco corner-bl"></div>
        <div class="corner-deco corner-br"></div>
        
        <!-- Sparkles -->
        <div class="sparkle">✨</div>
        <div class="sparkle">⭐</div>
        <div class="sparkle">💫</div>
        <div class="sparkle">✨</div>
        <div class="sparkle">⭐</div>
        <div class="sparkle">💫</div>
        <div class="sparkle">✨</div>
        <div class="sparkle">⭐</div>
        
        <!-- Top Logo -->
        <div class="top-logo">
            <div class="logo-icon">TG</div>
            <div class="logo-text">TG <span>Exchange</span></div>
        </div>
        
        <!-- Silver Badge -->
        <div class="silver-badge">
            <div class="badge-circle">
                <span>🥈</span>
            </div>
            <div class="badge-text">SILVER RANK</div>
        </div>
        
        <!-- Destination -->
        <div class="destination">
            <div class="dest-city">GANGTOK</div>
            <div class="dest-state">SIKKIM</div>
        </div>
        
        <!-- Trip Details -->
        <div class="trip-details">
            <div class="trip-box">
                <div class="trip-value">1</div>
                <div class="trip-label">Night</div>
            </div>
            <div class="trip-box">
                <div class="trip-value">2</div>
                <div class="trip-label">Days</div>
            </div>
            <div class="trip-box">
                <div class="trip-value">FREE</div>
                <div class="trip-label">Trip</div>
            </div>
        </div>
        
        <!-- Main Title -->
        <div class="main-title">
            <div class="title-text">
                <span class="white">SILVER RANK</span> <span class="gold">ACHIEVERS</span>
            </div>
        </div>
        
        <!-- Date Section - Colorful Rainbow -->
        <div class="date-section">
            <div class="date-box">
                <div class="date-text">15 APR - 15 MAY 2026</div>
            </div>
        </div>
    </div>
</body>
</html>
