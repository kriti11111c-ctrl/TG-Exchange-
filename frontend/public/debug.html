<!DOCTYPE html>
<html>
<head>
    <title>TG Exchange - Debug</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a2e; color: #fff; }
        .box { background: #16213e; padding: 15px; margin: 10px 0; border-radius: 8px; }
        button { background: #0f3460; color: #fff; padding: 10px 20px; border: none; border-radius: 5px; margin: 5px; cursor: pointer; }
        button:hover { background: #e94560; }
        input { padding: 10px; margin: 5px; width: 200px; border-radius: 5px; border: none; }
        pre { background: #0f0f23; padding: 10px; overflow-x: auto; font-size: 12px; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body>
    <h1>🔧 TG Exchange Debug Tool</h1>
    
    <div class="box">
        <h3>1. Current Token Status</h3>
        <pre id="tokenStatus">Click "Check Token" to see status</pre>
        <button onclick="checkToken()">Check Token</button>
        <button onclick="clearToken()">Clear Token</button>
    </div>
    
    <div class="box">
        <h3>2. Test Login</h3>
        <input type="email" id="email" placeholder="Email" value="kriti11111a@gmail.com">
        <input type="password" id="password" placeholder="Password" value="79896556">
        <button onclick="testLogin()">Test Login</button>
        <pre id="loginResult">Login result will appear here</pre>
    </div>
    
    <div class="box">
        <h3>3. Test Team Rank API</h3>
        <button onclick="testTeamRank()">Test Team Rank API</button>
        <pre id="teamRankResult">API result will appear here</pre>
    </div>
    
    <div class="box">
        <h3>4. Full Test (Login + API)</h3>
        <button onclick="fullTest()">Run Full Test</button>
        <pre id="fullTestResult">Full test result will appear here</pre>
    </div>

    <script>
        const API = 'https://tradegenius.exchange/api';
        
        function checkToken() {
            const token = localStorage.getItem('auth_token');
            const el = document.getElementById('tokenStatus');
            if (token) {
                el.innerHTML = `<span class="success">✅ Token Found!</span>\n\nToken (first 50 chars):\n${token.substring(0, 50)}...\n\nFull length: ${token.length} characters`;
            } else {
                el.innerHTML = `<span class="error">❌ No Token Found!</span>\n\nlocalStorage.getItem('auth_token') = null`;
            }
        }
        
        function clearToken() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user');
            document.getElementById('tokenStatus').innerHTML = '<span class="success">✅ Token Cleared!</span>';
        }
        
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const el = document.getElementById('loginResult');
            
            el.innerHTML = '⏳ Logging in...';
            
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.access_token) {
                    localStorage.setItem('auth_token', data.access_token);
                    el.innerHTML = `<span class="success">✅ Login Successful!</span>\n\nuser_id: ${data.user_id}\nemail: ${data.email}\nToken saved to localStorage!`;
                } else {
                    el.innerHTML = `<span class="error">❌ Login Failed!</span>\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (err) {
                el.innerHTML = `<span class="error">❌ Error!</span>\n\n${err.message}`;
            }
        }
        
        async function testTeamRank() {
            const el = document.getElementById('teamRankResult');
            const token = localStorage.getItem('auth_token');
            
            if (!token) {
                el.innerHTML = '<span class="error">❌ No token! Please login first.</span>';
                return;
            }
            
            el.innerHTML = '⏳ Fetching team rank...';
            
            try {
                const res = await fetch(`${API}/team-rank/info`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await res.json();
                
                el.innerHTML = `<span class="success">✅ API Response:</span>\n\nDirect Referrals: ${data.direct_referrals}\nTotal Team: ${data.total_team}\nBronze Members: ${data.bronze_members}\n\nFull Response:\n${JSON.stringify(data, null, 2).substring(0, 1000)}...`;
            } catch (err) {
                el.innerHTML = `<span class="error">❌ Error!</span>\n\n${err.message}`;
            }
        }
        
        async function fullTest() {
            const el = document.getElementById('fullTestResult');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            el.innerHTML = '⏳ Running full test...\n\n';
            
            try {
                // Step 1: Login
                el.innerHTML += '1. Logging in...\n';
                const loginRes = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const loginData = await loginRes.json();
                
                if (!loginData.access_token) {
                    el.innerHTML += `<span class="error">❌ Login failed: ${JSON.stringify(loginData)}</span>`;
                    return;
                }
                
                el.innerHTML += `<span class="success">✅ Login OK! user_id: ${loginData.user_id}</span>\n\n`;
                
                // Step 2: Test API
                el.innerHTML += '2. Testing Team Rank API...\n';
                const apiRes = await fetch(`${API}/team-rank/info`, {
                    headers: { 'Authorization': `Bearer ${loginData.access_token}` }
                });
                const apiData = await apiRes.json();
                
                el.innerHTML += `<span class="success">✅ API OK!</span>\n`;
                el.innerHTML += `\n📊 RESULTS:\n`;
                el.innerHTML += `   Direct Referrals: ${apiData.direct_referrals}\n`;
                el.innerHTML += `   Total Team: ${apiData.total_team}\n`;
                el.innerHTML += `   Bronze Members: ${apiData.bronze_members}\n`;
                
                if (apiData.direct_referrals > 0) {
                    el.innerHTML += `\n<span class="success">🎉 SUCCESS! Data is correct!</span>`;
                } else {
                    el.innerHTML += `\n<span class="error">⚠️ API returned 0 - Check backend logs</span>`;
                }
                
            } catch (err) {
                el.innerHTML += `<span class="error">❌ Error: ${err.message}</span>`;
            }
        }
        
        // Auto-check token on load
        checkToken();
    </script>
</body>
</html>
